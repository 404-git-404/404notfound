name: Shell checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check Bash syntax
        run: |
          bash -n 404notfound.sh
          bash -n request-cloudflare-certificate.sh

      - name: Extract and check embedded Cloudflare tool
        run: |
          awk '
            index($0, "<<") && index($0, "CLOUDFLARE_UFW_TOOL") { capture = 1; next }
            capture && $0 == "CLOUDFLARE_UFW_TOOL" { exit }
            capture { print }
          ' 404notfound.sh > /tmp/update-cloudflare-ufw
          test -s /tmp/update-cloudflare-ufw
          bash -n /tmp/update-cloudflare-ufw

      - name: Check embedded SmartDNS configuration
        run: |
          test ! -e configs/smartdns.conf
          grep -Fqx 'bind 127.0.0.1:53' 404notfound.sh
          grep -Fqx 'bind-tcp 127.0.0.1:53' 404notfound.sh
          grep -Fqx 'ca-file /etc/ssl/certs/ca-certificates.crt' 404notfound.sh
          grep -Fqx 'speed-check-mode tcp:443,ping' 404notfound.sh
          grep -Fqx 'response-mode first-ping' 404notfound.sh
          grep -Fqx 'server-https https://1.1.1.1/dns-query -host-name cloudflare-dns.com -tls-host-verify cloudflare-dns.com -http-host cloudflare-dns.com' 404notfound.sh
          grep -Fqx 'server-https https://8.8.8.8/dns-query -host-name dns.google -tls-host-verify dns.google -http-host dns.google' 404notfound.sh
          grep -Fqx 'server-https https://9.9.9.9/dns-query -host-name dns.quad9.net -tls-host-verify dns.quad9.net -http-host dns.quad9.net' 404notfound.sh
          test "$(grep -c '^server-https ' 404notfound.sh)" -eq 3
          ! grep -Eq '^server[[:space:]]+[0-9]' 404notfound.sh
          grep -Fq 'dig +time=5 +tries=1 +noall +answer' 404notfound.sh
          grep -Fq 'NF >= 5 && $3 == "IN" && $4 == "A"' 404notfound.sh
          grep -Fq 'journalctl -u smartdns.service -n 50 --no-pager' 404notfound.sh
          ! grep -Fq 'smartdns -c ' 404notfound.sh
          grep -Fq 'systemctl stop smartdns.service' 404notfound.sh
          grep -Fq 'pkill -TERM -x smartdns' 404notfound.sh
          grep -Fq 'pkill -KILL -x smartdns' 404notfound.sh
          grep -Fq 'rm -f -- /run/smartdns.pid /var/run/smartdns.pid' 404notfound.sh
          grep -Fq 'systemctl reset-failed smartdns.service' 404notfound.sh
          grep -Fq '127\.0\.0\.(53|54)' 404notfound.sh
          grep -Fq 'systemd-resolve(d)?' 404notfound.sh

      - name: Check installer regressions
        run: |
          ! grep -Fq 'Include /etc/ssh/sshd_config.d/00-hardening.conf' 404notfound.sh
          grep -Fq 'smartdns -v' 404notfound.sh
          ! grep -Fq 'smartdns -V' 404notfound.sh
          ! grep -Fq 'smartdns --version' 404notfound.sh
          grep -Fq 'sort -nu' 404notfound.sh

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck 404notfound.sh
          shellcheck request-cloudflare-certificate.sh
          shellcheck /tmp/update-cloudflare-ufw
