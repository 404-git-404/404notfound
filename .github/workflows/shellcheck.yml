name: Shell checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check Bash syntax
        run: |
          bash -n 01-bootstrap.sh
          bash -n request-cloudflare-certificate.sh
          bash -n scripts/update-cloudflare-ufw.sh

      - name: Check SmartDNS configuration artifact
        run: test -s configs/smartdns.conf

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck 01-bootstrap.sh
          shellcheck request-cloudflare-certificate.sh
          shellcheck scripts/update-cloudflare-ufw.sh
